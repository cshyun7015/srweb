services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: itil_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      # [호스트 경로]:[컨테이너 내부 데이터 경로]
      # 왼쪽의 ./db_data는 Mac 호스트의 현재 폴더에 생성될 폴더입니다.
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    platform: linux/arm64  # M4 칩에 최적화된 아키텍처 명시
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/itil_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:  # Docker가 내부적으로 권한을 관리함
